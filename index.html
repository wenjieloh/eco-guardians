<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invasive Alert 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">🌿 INVASIVE ALERT</div>
    </header>

    <main>
        <section id="hero">
            <h1>Protect Our <br><span style="color:#40916c">Ecosystem.</span></h1>
            <p style="font-size: 1.2rem; max-width: 600px; margin: 20px auto;">Identifying the alien species threatening Singapore's biodiversity.</p>
        </section>

        <div id="plant-guide">
            </div>

        <section style="text-align: center; padding: 5rem 2rem;">
            <div style="background: white; padding: 4rem; border-radius: 40px; box-shadow: var(--shadow);">
                <h2>Join the Citizen Science Movement</h2>
                <p>See an invader? Report it instantly via iNaturalist.</p>
                <a href="https://www.inaturalist.org/" target="_blank" class="btn">Launch Reporter App</a>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
